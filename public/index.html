<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MediPlus 💊</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>MediPlus 💊</h1>
    <p>Your trusted digital pharmacy</p>
  </header>

  <main>
    <h2>Available Medicines</h2>
    <div id="medicamentos" class="grid"></div>

    <h2>Add New Medicine</h2>
    <form id="form">
      <input type="text" id="nombre" placeholder="Medicine name" required>
      <input type="number" id="precio" placeholder="Price" required>
      <button type="submit">Add</button>
    </form>
  </main>

  <script src="app.js"></script>
</body>
</html>
